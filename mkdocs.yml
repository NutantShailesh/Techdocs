# 1. Project Information
site_name: Nutanix Techdocs
site_url: https://nutantshailesh.github.io/Techdocs/
site_author: Shailesh Jha
repo_url: https://github.com/NutantShailesh/Techdocs

# 2. Theme Configuration
theme:
  name: material
  language: en
  
  # Clean UI features
  features:
    - navigation.tabs          # Top horizontal menu bar
    - navigation.sections      # Grouped sidebar on the left
    - navigation.top           # "Back to top" button
    - search.suggest           # Typing suggestions in search
    - search.highlight         # Highlights search terms on the page
    - content.code.copy        # Adds a "Copy" button to code snippets

  # Professional Color Palette
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo          # Professional corporate blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate           # High-contrast dark mode
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# 3. Markdown Extensions (Enhances the content look)
markdown_extensions:
  - admonition                # Enables !!! info "Title" boxes
  - pymdownx.details          # Enables collapsible "??? info" blocks
  - pymdownx.superfences      # Better code blocks and diagrams
  - pymdownx.tabbed:          # Content tabs (e.g., for showing Python vs. Bash)
      alternate_style: true
  - toc:
      permalink: true         # Adds anchor links next to all headers

# 4. Navigation (Matches your specific folder structure)
nav:
  - Home: index.md
  - Security Audit: PII.md
  - User Guide:
    - Getting Started: guide/getting-started.md