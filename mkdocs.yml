# 1. Project information
site_name: Techdocs
site_url: https://nutantshailesh.github.io/Techdocs/
site_author: Your Name

# 2. Theme Configuration
theme:
  name: material
  language: en
  
  # Useful UI features
  features:
    - navigation.tabs          # Top menu bar
    - navigation.sections      # Grouped sidebar
    - navigation.top           # Back to top button
    - search.suggest           # Search typing predictions
    - search.highlight         # Highlight search results
    - content.code.copy        # "Copy" button on code blocks

  # Color Palette (Light/Dark mode toggle)
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# 3. Markdown Extensions (Enables callouts, tabs, and better code)
markdown_extensions:
  - admonition                # For !!! info "Title" boxes
  - pymdownx.details          # Collapsible blocks
  - pymdownx.superfences      # Better code blocks & diagrams
  - pymdownx.tabbed:          # Content tabs
      alternate_style: true
  - toc:
      permalink: true         # Adds anchor links to headers

# 4. Navigation (Start simple, add pages here as you create them)
nav:
  - Home: index.md
  - Guide:
      - Getting Started: guide/getting-started.md
  - About: about.md