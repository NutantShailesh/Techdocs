# 1. Project Information
site_name: Nutanix Techdocs
site_url: https://nutantshailesh.github.io/Techdocs/
site_author: Shailesh Jha
repo_url: https://github.com/NutantShailesh/Techdocs

# 2. Theme Configuration
theme:
  name: material
  language: en
  
  features:
    - navigation.tabs          
    - navigation.sections      
    - navigation.top           
    - search.suggest           
    - search.highlight         
    - content.code.copy        

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo          
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate           
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# 3. Markdown Extensions
markdown_extensions:
  - admonition                
  - pymdownx.details          
  - pymdownx.superfences      
  - pymdownx.tabbed:          
      alternate_style: true
  - toc:
      permalink: true         

# 4. Navigation (FIXED INDENTATION)
nav:
  - Home: index.md
  - PII: PII.md
  - User Guide:
      - Overview: guide/overview.md
      - URLS: guide/testurl.md
      - Inclusive words: 'guide/testwords.md'
      - UUIDs: guide/testuuids.md