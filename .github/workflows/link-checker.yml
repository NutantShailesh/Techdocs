name: Check Links

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Allows manual triggering for your demo

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --include-verbatim: CRITICAL - This finds plain text URLs
          # --config lychee.toml: Uses your Nutanix exclusion rules
          # --verbose: Shows every link found in the console logs
          # . : Scans every file in the entire repository
          args: --config lychee.toml --verbose --no-progress --include-verbatim .
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}