name: Check Links

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Allows you to trigger the test manually for the demo

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --config lychee.toml: Use your custom Nutanix rules
          # --verbose: Show every link being checked in the logs
          # . : Scan the entire repository for links
          args: --config lychee.toml --verbose --no-progress .
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}