name: Check Links

on:
  push:
    branches: [main, master]
  workflow_dispatch: 

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # We use the config file for the "Logic" and the args for the "Files"
          args: --config lychee.toml --verbose --no-progress "**/*.md"
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}