name: Check Links (Lychee)

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.html'
  schedule:
    - cron: '0 8 * * 1' # Runs every Monday morning
  workflow_dispatch:      # Allows you to click "Run" manually

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        id: lychee
        with:
          # EDGE CASE: Only pass valid tool arguments here.
          # We check the docs folder and ignore any generated 'site' folder.
          args: --config lychee.toml "docs/**/*.md" "index.md"
          
          # EDGE CASE: Handled by the Action wrapper (Fixes your previous error)
          failIfEmpty: false
          
          # EDGE CASE: Creates a clean summary in the GitHub Step
          format: markdown
          output: lychee-report.md

        env:
          # EDGE CASE: Prevents "403 Forbidden" errors from GitHub rate limits
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail Build on Broken Links
        # EDGE CASE: Only fails if there are ACTUAL broken links (not just empty)
        if: steps.lychee.outputs.exit_code != 0
        run: |
          echo "❌ Broken links detected. See the summary report for details."
          exit ${{ steps.lychee.outputs.exit_code }}