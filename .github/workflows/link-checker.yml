name: Check Links

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Allows manual "Run" for the demo

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Check everything in the docs folder and the root index
          args: --config lychee.toml "docs/**/*.md" "index.md"
          # Ensures the demo doesn't crash if you have an empty file
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}