name: Deploy MkDocs
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # This forces all actions to use Node 24 and clears the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v4 is the stable standard

      - name: Step 1 - Style Check (Vale)
        uses: errata-ai/vale-action@v2
        with:
          files: docs/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Build site
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5 # v5 IS valid for this specific action

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # v3 is the correct version here
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # FIX: Changed from v5 back to v4