StylesPath = styles
MinAlertLevel = suggestion

Packages = Microsoft

[*.md]
# 1. Load the core Vale rules, the Microsoft base, and ALL your Nutanix files
BasedOnStyles = Vale, Microsoft, Nutanix

# 2. DISABLE overlapping Microsoft rules so yours take priority
# Add any other Microsoft rules here that conflict with your files
Microsoft.offensive = NO
Microsoft.Acronyms = NO
Microsoft.GeneralAppearance = NO

# 3. SET your Nutanix rules to 'error' or 'warning' specifically if needed
Nutanix.offensive = error
Nutanix.branding = warning