# --- MINIMAL DEMO CONFIG ---

# 1. Ignore Internal/VPN/Localhost
exclude = [
    'https://internal.nutanix.com/.*',
    'https://localhost:.*',
    'http://127.0.0.1:.*',
    'https://my.nutanix.com/.*'
]

# 2. Skip emails and private network IPs
include_mail = false
exclude_all_private = true

# 3. Settings to prevent timeouts
timeout = 20
max_retries = 2