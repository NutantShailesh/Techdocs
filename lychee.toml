# --- FINAL DEMO CONFIG ---

# 1. THE "CATCH-ALL" SETTING
# Finds URLs even if they aren't in Markdown [brackets](link)
include_verbatim = true

# 2. IGNORE INTERNAL/VPN LINKS
# Prevents false negatives for links that only work on the Nutanix VPN
exclude = [
    'https://internal.nutanix.com/.*',
    'https://localhost:.*',
    'http://127.0.0.1:.*',
    'https://my.nutanix.com/.*'
]

# 3. PROTOCOL & SECURITY
include_mail = false
exclude_all_private = true

# 4. PERFORMANCE
timeout = 20
max_retries = 2